id = "fosskar/voxtype"
name = "Voxtype"
version = "1.0.0"
plugin_api = 3
author = "fosskar"
license = "MIT"
tags = ["voice", "dictation"]
icon = "microphone"
description = "Voxtype status and recording control."

[[setting]]
key = "command"
type = "string"
label_key = "settings.command.label"
default = "voxtype"

[[setting]]
key = "hide_idle"
type = "bool"
label_key = "settings.hide_idle.label"
default = false

[[widget]]
id = "status"
entry = "status.luau"

[[service]]
id = "watcher"
entry = "watcher.luau"
