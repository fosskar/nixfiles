<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>pi sketch</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        background: #1a1a1a;
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        padding: 20px;
      }
      .toolbar {
        display: flex;
        gap: 12px;
        align-items: center;
        color: #888;
        font-size: 14px;
      }
      .toolbar button {
        background: #333;
        color: #fff;
        border: none;
        padding: 8px 16px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 14px;
      }
      .toolbar button:hover {
        background: #444;
      }
      .toolbar button.primary {
        background: #2563eb;
      }
      .toolbar button.primary:hover {
        background: #1d4ed8;
      }
      .tool-btn {
        background: #333;
        color: #fff;
        border: 2px solid transparent;
        padding: 6px 10px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 13px;
      }
      .tool-btn:hover {
        background: #444;
      }
      .tool-btn.active {
        border-color: #2563eb;
      }
      .brush-sizes {
        display: flex;
        gap: 6px;
      }
      .brush-size {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        background: #333;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        border: 2px solid transparent;
      }
      .brush-size:hover {
        background: #444;
      }
      .brush-size.active {
        border-color: #2563eb;
      }
      .brush-size .dot {
        background: #fff;
        border-radius: 50%;
      }
      .colors {
        display: flex;
        gap: 4px;
      }
      .color-btn {
        width: 24px;
        height: 24px;
        border-radius: 50%;
        cursor: pointer;
        border: 2px solid transparent;
      }
      .color-btn:hover {
        opacity: 0.8;
      }
      .color-btn.active {
        border-color: #fff;
      }
      .canvas-container {
        position: relative;
        display: inline-block;
      }
      canvas {
        background: #fff;
        border-radius: 8px;
        cursor: crosshair;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
      }
      .resize-handle {
        position: absolute;
        bottom: 4px;
        right: 4px;
        width: 16px;
        height: 16px;
        cursor: nwse-resize;
        background: linear-gradient(135deg, transparent 50%, #666 50%);
        border-radius: 0 0 6px 0;
        opacity: 0.7;
      }
      .resize-handle:hover {
        opacity: 1;
      }
      .hint {
        color: #666;
        font-size: 13px;
      }
      kbd {
        background: #333;
        padding: 2px 6px;
        border-radius: 4px;
        font-family: inherit;
      }
    </style>
  </head>
  <body>
    <div class="toolbar">
      <div style="display: flex; gap: 4px">
        <button class="tool-btn active" data-tool="pen">✏️</button>
        <button class="tool-btn" data-tool="line">╱</button>
        <button class="tool-btn" data-tool="rect">▭</button>
        <button class="tool-btn" data-tool="arrow">→</button>
      </div>
      <div class="colors">
        <div
          class="color-btn active"
          data-color="#000000"
          style="background: #000"
        ></div>
        <div
          class="color-btn"
          data-color="#ef4444"
          style="background: #ef4444"
        ></div>
        <div
          class="color-btn"
          data-color="#22c55e"
          style="background: #22c55e"
        ></div>
        <div
          class="color-btn"
          data-color="#3b82f6"
          style="background: #3b82f6"
        ></div>
        <div
          class="color-btn"
          data-color="#ffffff"
          style="background: #fff"
        ></div>
      </div>
      <div class="brush-sizes">
        <div class="brush-size" data-size="2">
          <div class="dot" style="width: 4px; height: 4px"></div>
        </div>
        <div class="brush-size active" data-size="4">
          <div class="dot" style="width: 8px; height: 8px"></div>
        </div>
        <div class="brush-size" data-size="8">
          <div class="dot" style="width: 14px; height: 14px"></div>
        </div>
      </div>
      <button onclick="clearCanvas()">Clear</button>
      <button onclick="undo()">Undo</button>
      <button class="primary" onclick="send()">Send</button>
      <button onclick="cancel()">Cancel</button>
    </div>

    <div class="canvas-container">
      <canvas id="canvas" width="1000" height="600"></canvas>
      <div class="resize-handle" id="resizeHandle"></div>
    </div>

    <div class="hint">
      <kbd>Enter</kbd> send · <kbd>Esc</kbd> cancel · <kbd>Ctrl+Z</kbd> undo ·
      <kbd>Ctrl+Shift+Z</kbd> redo · <kbd>Ctrl+V</kbd> paste · <kbd>P</kbd>en
      <kbd>L</kbd>ine <kbd>R</kbd>ect <kbd>A</kbd>rrow · <kbd>1-3</kbd> brush ·
      <kbd>C</kbd> clear
    </div>

    <script>
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");

      let drawing = false;
      let brushSize = 4;
      let brushColor = "#000000";
      let currentTool = "pen";
      let history = [];
      let redoStack = [];
      let lastX, lastY;
      let shapeStartX,
        shapeStartY,
        preShapeState = null;

      saveState();

      function saveState() {
        history.push(canvas.toDataURL());
        redoStack = [];
        if (history.length > 50) history.shift();
      }

      function undo() {
        if (history.length > 1) {
          redoStack.push(history.pop());
          restoreState(history[history.length - 1]);
        }
      }

      function redo() {
        if (redoStack.length > 0) {
          const state = redoStack.pop();
          history.push(state);
          restoreState(state);
        }
      }

      function restoreState(dataUrl) {
        const img = new Image();
        img.onload = () => {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          ctx.drawImage(img, 0, 0);
        };
        img.src = dataUrl;
      }

      function clearCanvas() {
        ctx.fillStyle = "#fff";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        saveState();
      }

      function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        return {
          x: (e.clientX - rect.left) * (canvas.width / rect.width),
          y: (e.clientY - rect.top) * (canvas.height / rect.height),
        };
      }

      function drawArrowhead(fromX, fromY, toX, toY, size) {
        const angle = Math.atan2(toY - fromY, toX - fromX);
        ctx.beginPath();
        ctx.moveTo(toX, toY);
        ctx.lineTo(
          toX - size * Math.cos(angle - Math.PI / 6),
          toY - size * Math.sin(angle - Math.PI / 6),
        );
        ctx.lineTo(
          toX - size * Math.cos(angle + Math.PI / 6),
          toY - size * Math.sin(angle + Math.PI / 6),
        );
        ctx.closePath();
        ctx.fillStyle = brushColor;
        ctx.fill();
      }

      function drawShape(x1, y1, x2, y2) {
        ctx.strokeStyle = brushColor;
        ctx.lineWidth = brushSize;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";

        if (currentTool === "line") {
          ctx.beginPath();
          ctx.moveTo(x1, y1);
          ctx.lineTo(x2, y2);
          ctx.stroke();
        } else if (currentTool === "arrow") {
          ctx.beginPath();
          ctx.moveTo(x1, y1);
          ctx.lineTo(x2, y2);
          ctx.stroke();
          drawArrowhead(x1, y1, x2, y2, Math.max(12, brushSize * 4));
        } else if (currentTool === "rect") {
          ctx.strokeRect(
            Math.min(x1, x2),
            Math.min(y1, y2),
            Math.abs(x2 - x1),
            Math.abs(y2 - y1),
          );
        }
      }

      function drawShapePreview(x, y) {
        if (!preShapeState) return;
        const img = new Image();
        img.onload = () => {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          ctx.drawImage(img, 0, 0);
          drawShape(shapeStartX, shapeStartY, x, y);
        };
        img.src = preShapeState;
      }

      canvas.addEventListener("mousedown", (e) => {
        drawing = true;
        const pos = getPos(e);
        lastX = pos.x;
        lastY = pos.y;

        if (currentTool === "pen") {
          ctx.beginPath();
          ctx.arc(pos.x, pos.y, brushSize / 2, 0, Math.PI * 2);
          ctx.fillStyle = brushColor;
          ctx.fill();
        } else {
          shapeStartX = pos.x;
          shapeStartY = pos.y;
          preShapeState = canvas.toDataURL();
        }
      });

      canvas.addEventListener("mousemove", (e) => {
        if (!drawing) return;
        const pos = getPos(e);

        if (currentTool === "pen") {
          ctx.beginPath();
          ctx.moveTo(lastX, lastY);
          ctx.lineTo(pos.x, pos.y);
          ctx.strokeStyle = brushColor;
          ctx.lineWidth = brushSize;
          ctx.lineCap = "round";
          ctx.lineJoin = "round";
          ctx.stroke();
          lastX = pos.x;
          lastY = pos.y;
        } else {
          drawShapePreview(pos.x, pos.y);
        }
      });

      canvas.addEventListener("mouseup", () => {
        if (drawing) {
          drawing = false;
          preShapeState = null;
          saveState();
        }
      });
      canvas.addEventListener("mouseleave", () => {
        if (drawing) {
          drawing = false;
          preShapeState = null;
          saveState();
        }
      });

      // tool/color/brush selection
      document.querySelectorAll(".tool-btn").forEach((el) => {
        el.addEventListener("click", () => {
          document
            .querySelectorAll(".tool-btn")
            .forEach((b) => b.classList.remove("active"));
          el.classList.add("active");
          currentTool = el.dataset.tool;
        });
      });

      function selectTool(tool) {
        document
          .querySelectorAll(".tool-btn")
          .forEach((b) =>
            b.classList.toggle("active", b.dataset.tool === tool),
          );
        currentTool = tool;
      }

      document.querySelectorAll(".brush-size").forEach((el) => {
        el.addEventListener("click", () => {
          document
            .querySelectorAll(".brush-size")
            .forEach((b) => b.classList.remove("active"));
          el.classList.add("active");
          brushSize = parseInt(el.dataset.size);
        });
      });

      document.querySelectorAll(".color-btn").forEach((el) => {
        el.addEventListener("click", () => {
          document
            .querySelectorAll(".color-btn")
            .forEach((b) => b.classList.remove("active"));
          el.classList.add("active");
          brushColor = el.dataset.color;
        });
      });

      // keyboard shortcuts
      document.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          e.preventDefault();
          send();
        } else if (e.key === "Escape") {
          cancel();
        } else if (e.key === "z" && (e.ctrlKey || e.metaKey) && e.shiftKey) {
          e.preventDefault();
          redo();
        } else if (e.key === "z" && (e.ctrlKey || e.metaKey)) {
          e.preventDefault();
          undo();
        } else if (e.key.toLowerCase() === "c" && !e.ctrlKey && !e.metaKey) {
          clearCanvas();
        } else if (e.key.toLowerCase() === "p" && !e.ctrlKey && !e.metaKey) {
          selectTool("pen");
        } else if (e.key.toLowerCase() === "l" && !e.ctrlKey && !e.metaKey) {
          selectTool("line");
        } else if (e.key.toLowerCase() === "r" && !e.ctrlKey && !e.metaKey) {
          selectTool("rect");
        } else if (e.key.toLowerCase() === "a" && !e.ctrlKey && !e.metaKey) {
          selectTool("arrow");
        } else if (e.key === "1") {
          document.querySelector('[data-size="2"]').click();
        } else if (e.key === "2") {
          document.querySelector('[data-size="4"]').click();
        } else if (e.key === "3") {
          document.querySelector('[data-size="8"]').click();
        }
      });

      // clipboard paste
      document.addEventListener("paste", async (e) => {
        const items = e.clipboardData?.items;
        if (!items) return;
        for (const item of items) {
          if (item.type.startsWith("image/")) {
            e.preventDefault();
            const blob = item.getAsFile();
            if (!blob) continue;
            const img = new Image();
            img.onload = () => {
              const maxW = 1000,
                maxH = 600;
              const scale = Math.min(maxW / img.width, maxH / img.height, 1);
              const w = Math.round(img.width * scale),
                h = Math.round(img.height * scale);
              canvas.width = w;
              canvas.height = h;
              ctx.fillStyle = "#fff";
              ctx.fillRect(0, 0, w, h);
              ctx.drawImage(img, 0, 0, w, h);
              saveState();
              URL.revokeObjectURL(img.src);
            };
            img.src = URL.createObjectURL(blob);
            break;
          }
        }
      });

      let submitted = false;
      async function send() {
        if (submitted) return;
        submitted = true;
        const base64 = canvas.toDataURL("image/png").split(",")[1];
        await fetch("/submit", {
          method: "POST",
          headers: { "Content-Type": "text/plain" },
          body: base64,
        });
        window.close();
      }
      async function cancel() {
        if (submitted) return;
        submitted = true;
        await fetch("/cancel", { method: "POST" });
        window.close();
      }

      // resize handle
      const resizeHandle = document.getElementById("resizeHandle");
      resizeHandle.addEventListener("mousedown", (e) => {
        e.preventDefault();
        const startX = e.clientX,
          startY = e.clientY;
        const startW = canvas.width,
          startH = canvas.height;
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        let active = true;

        const onMove = (e) => {
          if (!active) return;
          canvas.width = Math.max(200, startW + (e.clientX - startX));
          canvas.height = Math.max(150, startH + (e.clientY - startY));
          ctx.fillStyle = "#fff";
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.putImageData(imageData, 0, 0);
        };
        const onUp = () => {
          if (active) {
            active = false;
            saveState();
          }
          document.removeEventListener("mousemove", onMove);
          document.removeEventListener("mouseup", onUp);
        };
        document.addEventListener("mousemove", onMove);
        document.addEventListener("mouseup", onUp);
      });

      clearCanvas();
      history = [];
      saveState();

      window.addEventListener("beforeunload", () => {
        navigator.sendBeacon("/cancel");
      });
    </script>
  </body>
</html>
