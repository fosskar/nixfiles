name: update packages
on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
concurrency:
  group: update-packages
  cancel-in-progress: false
jobs:
  update:
    runs-on: nixworker
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          token: ${{ secrets.TOKEN }}
      - name: update packages
        env:
          TOKEN: ${{ secrets.TOKEN }}
          RENOVATE_GITHUB_COM_TOKEN: ${{ secrets.RENOVATE_GITHUB_COM_TOKEN }}
        run: |
          set -euo pipefail

          base="main"
          api="${{ forgejo.api_url }}/repos/${{ forgejo.repository }}"

          api_call() {
            local method="$1"
            local url="$2"
            local data="${3:-}"
            local headers body status retry_after

            headers="$(mktemp)"
            body="$(mktemp)"
            trap 'rm -f "$headers" "$body"' RETURN

            for delay in 5 15 45 120; do
              if [ -n "$data" ]; then
                status="$(curl -sS -D "$headers" -o "$body" -w '%{http_code}' \
                  -H "Authorization: token $TOKEN" \
                  -H "Content-Type: application/json" \
                  -X "$method" \
                  -d "$data" \
                  "$url")"
              else
                status="$(curl -sS -D "$headers" -o "$body" -w '%{http_code}' \
                  -H "Authorization: token $TOKEN" \
                  -X "$method" \
                  "$url")"
              fi

              if [ "$status" -lt 400 ]; then
                cat "$body"
                return 0
              fi

              if [ "$status" = 429 ]; then
                echo ":: api rate limited: $method $url" >&2
                cat "$headers" >&2
                retry_after="$(awk 'tolower($1) == "retry-after:" { print $2 }' "$headers" | tr -d '\r' | tail -n1)"
                sleep "${retry_after:-$delay}"
                continue
              fi

              echo ":: api error $status: $method $url" >&2
              cat "$headers" >&2
              cat "$body" >&2
              return 1
            done

            echo ":: api error: retries exhausted: $method $url" >&2
            cat "$body" >&2
            return 1
          }

          git config user.name "nixbot"
          git config user.email "nixbot@noreply.codeberg.org"
          git fetch origin "$base"

          prs="$(api_call GET "$api/pulls?state=open&limit=50")"

          update_package() {
            local pkg="$1"
            local dir="$2"
            local json script
            local -a cmd

            if grep -q "updateScript" "$dir/default.nix" 2>/dev/null; then
              echo ":: $pkg - using nix updateScript"
              json="$(nix eval --json ".#$pkg.updateScript")" || return 1

              if [ "$(printf '%s' "$json" | jq -r 'type')" = "array" ]; then
                mapfile -t cmd < <(printf '%s' "$json" | jq -r '.[]')
                if [[ "${cmd[0]}" == /nix/store/*/bin/nix-update || "${cmd[0]}" == "nix-update" ]]; then
                  env -u GITHUB_TOKEN nix shell nixpkgs#nix-update -c nix-update "${cmd[@]:1}" -F "$pkg"
                else
                  "${cmd[@]}" -F "$pkg"
                fi
              else
                script="$(printf '%s' "$json" | jq -r '.')"
                "$script"
              fi
            elif [ -x "$dir/update.sh" ]; then
              echo ":: $pkg - using update.sh"
              # forgejo injects a codeberg GITHUB_TOKEN; drop it so update scripts
              # that hit api.github.com don't basic-auth with a non-github token (=> 401).
              # scripts pick up RENOVATE_GITHUB_COM_TOKEN for github auth (rate limits).
              env -u GITHUB_TOKEN "$dir/update.sh"
            else
              echo ":: $pkg - no updater, skipping"
            fi
          }

          # packages released together share one branch/PR; codeberg's spam
          # filter rejects >2 similarly named PRs per hour, which a burst of
          # per-package netbird PRs trips.
          declare -A pkg_group=(
            [netbird-client]=netbird
            [netbird-dashboard]=netbird
            [netbird-proxy]=netbird
            [netbird-server]=netbird
          )

          declare -A group_pkgs=()
          for dir in packages/*/; do
            pkg="$(basename "$dir")"
            group="${pkg_group[$pkg]:-$pkg}"
            group_pkgs[$group]+=" $pkg"
          done

          for group in $(printf '%s\n' "${!group_pkgs[@]}" | sort); do
            branch="update-package-$group"

            git reset --hard
            git clean -fd
            git switch -C "$branch" "origin/$base"

            for pkg in ${group_pkgs[$group]}; do
              dir="packages/$pkg/"
              if ! update_package "$pkg" "$dir"; then
                echo ":: $pkg - update failed, skipping"
                continue
              fi

              nix fmt
              git add "$dir"
            done

            if git diff --cached --quiet; then
              echo ":: $group - no update"
              continue
            fi

            git commit -m "update pkgs $group"
            git push --force-with-lease origin "$branch"

            pr_number="$(printf '%s' "$prs" | jq -r --arg branch "$branch" --arg base "$base" '
              map(select(.head.ref == $branch and .base.ref == $base))
              | .[0].number // empty
            ')"

            if [ -z "$pr_number" ]; then
              pr="$(api_call POST "$api/pulls" "$(jq -nc \
                --arg title "update $group" \
                --arg head "$branch" \
                --arg base "$base" \
                --arg body "automated package update for $group." \
                '{title: $title, head: $head, base: $base, body: $body}')")"
              pr_number="$(printf '%s' "$pr" | jq -r '.number')"
              prs="$(printf '%s' "$prs" | jq --argjson pr "$pr" '. + [$pr]')"
            fi

            api_call POST \
              "$api/pulls/$pr_number/merge" \
              '{"Do":"squash","merge_when_checks_succeed":true,"delete_branch_after_merge":true}' \
              >/dev/null || echo ":: automerge request queued or pending"
          done
