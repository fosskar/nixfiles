name: update packages
on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:
concurrency:
  group: update-packages
  cancel-in-progress: false
jobs:
  update:
    runs-on: codeberg-medium
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          token: ${{ secrets.TOKEN }}
      - name: install nix
        uses: https://github.com/NixOS/nix-installer-action@6b8548fe06acfb0155a50ab5d561accb215764cc # main
        with:
          extra-conf: |
            experimental-features = nix-command flakes
      - name: update packages
        env:
          TOKEN: ${{ secrets.TOKEN }}
          RENOVATE_GITHUB_COM_TOKEN: ${{ secrets.RENOVATE_GITHUB_COM_TOKEN }}
        run: |
          set -euo pipefail

          base="main"
          api="${{ forgejo.api_url }}/repos/${{ forgejo.repository }}"

          git config user.name "nixfiles-bot"
          git config user.email "nixfiles-bot@noreply.codeberg.org"
          git fetch origin "$base"

          update_package() {
            local pkg="$1"
            local dir="$2"
            local json script
            local -a cmd

            if grep -q "updateScript" "$dir/default.nix" 2>/dev/null; then
              echo ":: $pkg - using nix updateScript"
              json="$(nix eval --json ".#$pkg.updateScript")" || return 1

              if [ "$(printf '%s' "$json" | jq -r 'type')" = "array" ]; then
                mapfile -t cmd < <(printf '%s' "$json" | jq -r '.[]')
                if [[ "${cmd[0]}" == /nix/store/*/bin/nix-update || "${cmd[0]}" == "nix-update" ]]; then
                  env -u GITHUB_TOKEN nix shell nixpkgs#nix-update -c nix-update "${cmd[@]:1}" -F "$pkg"
                else
                  "${cmd[@]}" -F "$pkg"
                fi
              else
                script="$(printf '%s' "$json" | jq -r '.')"
                "$script"
              fi
            elif [ -x "$dir/update.sh" ]; then
              echo ":: $pkg - using update.sh"
              # forgejo injects a codeberg GITHUB_TOKEN; drop it so update scripts
              # that hit api.github.com don't basic-auth with a non-github token (=> 401).
              # scripts pick up RENOVATE_GITHUB_COM_TOKEN for github auth (rate limits).
              env -u GITHUB_TOKEN "$dir/update.sh"
            else
              echo ":: $pkg - no updater, skipping"
            fi
          }

          for dir in packages/*/; do
            pkg="$(basename "$dir")"
            branch="update-package-$pkg"

            git reset --hard
            git clean -fd
            git switch -C "$branch" "origin/$base"

            if ! update_package "$pkg" "$dir"; then
              echo ":: $pkg - update failed, skipping"
              continue
            fi

            nix fmt
            git add "$dir"

            if git diff --cached --quiet; then
              echo ":: $pkg - no update"
              continue
            fi

            git commit -m "update pkgs $pkg"
            git push --force-with-lease origin "$branch"

            prs="$(curl -fsS \
              -H "Authorization: token $TOKEN" \
              "$api/pulls?state=open")"
            pr_number="$(printf '%s' "$prs" | jq -r --arg branch "$branch" --arg base "$base" '
              map(select(.head.ref == $branch and .base.ref == $base))
              | .[0].number // empty
            ')"

            if [ -z "$pr_number" ]; then
              pr_number="$(curl -fsS \
                -H "Authorization: token $TOKEN" \
                -H "Content-Type: application/json" \
                -X POST \
                -d "$(jq -nc \
                  --arg title "update $pkg" \
                  --arg head "$branch" \
                  --arg base "$base" \
                  --arg body "automated package update for $pkg." \
                  '{title: $title, head: $head, base: $base, body: $body}')" \
                "$api/pulls" | jq -r '.number')"
            fi

            curl -sS \
              -H "Authorization: token $TOKEN" \
              -H "Content-Type: application/json" \
              -X POST \
              -d '{"Do":"squash","merge_when_checks_succeed":true,"delete_branch_after_merge":true}' \
              "$api/pulls/$pr_number/merge" || echo ":: automerge request queued or pending"
          done
