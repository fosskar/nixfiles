name: update flake inputs
on:
  schedule:
    - cron: "0 3 * * *" # nightly at 03:00 UTC
  workflow_dispatch:
jobs:
  update:
    runs-on: codeberg-small
    steps:
      - uses: actions/checkout@v4
      - name: install nix
        uses: https://github.com/cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - name: update flake inputs
        env:
          GITEA_TOKEN: ${{ secrets.TOKEN }}
        run: |
          nix run \
            "github:Mic92/update-flake-inputs-gitea" -- \
            --gitea-url "https://codeberg.org" \
            --gitea-repository "fosskar/nixfiles" \
            --base-branch "main" \
            --git-author-name "flake-updater" \
            --git-author-email "flake-updater@noreply.codeberg.org" \
            --git-committer-name "flake-updater" \
            --git-committer-email "flake-updater@noreply.codeberg.org" \
            --auto-merge
