# telegraf configuration for openwrt
# minimal config for unbound + adguard home metrics
[agent]
  interval = "60s"
  flush_interval = "60s"
# expose metrics for prometheus to scrape
[[outputs.prometheus_client]]
  listen = ":9273"
  metric_version = 2
# unbound dns stats
[[inputs.unbound]]
  server = "127.0.0.1:8953"
  binary = "/usr/sbin/unbound-control"
  thread_as_tag = true
# adguard home stats via api
[[inputs.http]]
  urls = ["http://192.168.10.1:8080/control/stats"]
  username = "admin"
  password = "@adguard_password@"
  data_format = "json"
  name_override = "adguard"
  # stats json flattens top_*/per-hour arrays into unbounded per-domain fields
  fieldinclude = ["num_*", "avg_processing_time"]
